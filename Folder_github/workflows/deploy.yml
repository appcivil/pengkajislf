name: Deploy Smart AI SLF to GitHub Pages

on:
  push:
    branches: ["main"]

  # Memungkinkan dijalankan secara manual dari tab Actions
  workflow_dispatch:

# Izin yang diperlukan untuk menulis ke branch gh-pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Mencegah multiple deploys bersamaan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Folder yang dihasilkan oleh 'vite build'
          branch: gh-pages # Branch target untuk GitHub Pages
