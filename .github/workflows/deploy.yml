name: Deploy Smart AI SLF to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm install

      - name: Setup Supabase CLI 🛠️
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase Edge Function (AI Proxy) 🚀
        run: |
          # 1. Mendeteksi Project ID
          PROJECT_ID="${{ secrets.SUPABASE_PROJECT_ID }}"
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="hrzplcqeadhvbrfhlfuh"
            echo "⚠️ SUPABASE_PROJECT_ID secret not found. Falling back to ID from .env: $PROJECT_ID"
          fi

          # 2. Membuat file .env menggunakan echo untuk keamanan indentasi YAML
          echo "GEMINI_API_KEY=\"${{ secrets.VITE_GEMINI_API_KEY || secrets.GEMINI_API_KEY }}\"" > .temp.env
          echo "OPENAI_API_KEY=\"${{ secrets.VITE_OPENAI_API_KEY || secrets.OPENAI_API_KEY }}\"" >> .temp.env
          echo "CLAUDE_API_KEY=\"${{ secrets.VITE_CLAUDE_API_KEY || secrets.CLAUDE_API_KEY }}\"" >> .temp.env
          echo "GROQ_API_KEY=\"${{ secrets.VITE_GROQ_API_KEY || secrets.GROQ_API_KEY }}\"" >> .temp.env
          echo "OPENROUTER_API_KEY=\"${{ secrets.VITE_OPENROUTER_API_KEY || secrets.OPENROUTER_API_KEY }}\"" >> .temp.env
          echo "MISTRAL_API_KEY=\"${{ secrets.VITE_MISTRAL_API_KEY || secrets.MISTRAL_API_KEY }}\"" >> .temp.env
          echo "HF_API_TOKEN=\"${{ secrets.VITE_HF_API_TOKEN || secrets.HF_API_TOKEN }}\"" >> .temp.env

          # 3. Membersihkan baris kosong (jika ada secret yang tidak diisi di GitHub)
          sed -i '/=""/d' .temp.env

          # 4. Set secrets & deploy
          if [ -s .temp.env ]; then
            supabase secrets set --env-file .temp.env --project-ref "$PROJECT_ID"
          fi
          
          supabase functions deploy ai-proxy --project-ref "$PROJECT_ID"
          
          # 5. Cleanup
          rm .temp.env
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Build 🏗️
        run: npm run build
        env:
          # Database
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # App Config
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME || 'Smart AI Pengkaji SLF' }}
          VITE_APP_VERSION: ${{ secrets.VITE_APP_VERSION || '2.1.0' }}
          # AI Proxy URL
          VITE_AI_PROXY_URL: ${{ secrets.VITE_AI_PROXY_URL }}
          # Google Integration (GAS Proxy)
          VITE_GOOGLE_APPS_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_APPS_SCRIPT_URL }}
          VITE_GOOGLE_DOC_TEMPLATE_ID: ${{ secrets.VITE_GOOGLE_DOC_TEMPLATE_ID }}
          VITE_GCP_API_KEY: ${{ secrets.VITE_GCP_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          # Direct AI Access (Optional if using Proxy)
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_CLAUDE_API_KEY: ${{ secrets.VITE_CLAUDE_API_KEY }}
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_MISTRAL_API_KEY: ${{ secrets.VITE_MISTRAL_API_KEY }}
          VITE_HF_SLF_OPUS_URL: ${{ secrets.VITE_HF_SLF_OPUS_URL }}
          VITE_HF_API_TOKEN: ${{ secrets.VITE_HF_API_TOKEN }}

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Upload artifact 📤
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
