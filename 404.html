<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Smart AI Pengkaji SLF - Redirecting...</title>
    <script type="text/javascript">
      // Presidential SPA Redirector for GitHub Pages
      // Logic: If we hit a 404, redirect back to the index with the path as a hash
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div style="font-family: 'Inter', sans-serif; height: 100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0a0f1d; color:white;">
      <h2 style="font-weight: 800; letter-spacing: -0.02em;">Authenticating System Path...</h2>
      <p style="opacity:0.6; font-size:0.9rem;">Please wait while Smart AI recalibrates your session.</p>
    </div>
  </body>
</html>
