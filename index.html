    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer crossorigin=""></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
    
    <!-- Fallback for CDN failures -->
    <script>
      // Check if Font Awesome loaded
      window.addEventListener('load', function() {
        const testIcon = document.createElement('i');
        testIcon.className = 'fas fa-test';
        document.body.appendChild(testIcon);
        const styles = window.getComputedStyle(testIcon);
        const fontFamily = styles.fontFamily;
        document.body.removeChild(testIcon);
        
        if (!fontFamily || fontFamily === '"Font Awesome 6 Free"') {
          console.warn('[CDN Fallback] Font Awesome not loaded, using inline SVG fallback');
        }
      });
    </script>
    
    <!-- Inline Font Fallback CSS -->
    <style>
      /* Inter font fallback via system fonts */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 300 800;
        font-display: swap;
        src: local('Inter'), local('Inter-Regular'), 
             local('Segoe UI'), local('Roboto'), local('Arial');
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 400 500;
        font-display: swap;
        src: local('JetBrains Mono'), local('Consolas'), local('Monaco'), local('monospace');
      }
    </style>
  </head>

        </div>
        
        <div class="loading-text-area">
          <h2 class="loading-title">Smart AI Pengkaji SLF</h2>
          <div class="loading-status-container">

          </div>
          <div class="loading-bar-wrapper">
            <div class="loading-bar-glow" id="loading-progress"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="app"></div>
    <div id="sync-indicator-root"></div>
    <script type="module" src="src/main.js"></script>
  </body>
